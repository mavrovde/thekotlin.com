spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/thekotlin}
    username: ${DB_USERNAME:thekotlin}
    password: ${DB_PASSWORD:thekotlin_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholder-replacement: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:TheKotlinComSuperSecretKeyForJWTTokensThatShouldBeAtLeast256BitsLong!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
