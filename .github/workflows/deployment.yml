name: CI & Deployment

on:
    push:
        branches: [main]
        tags:
            - 'v*.*.*'
    pull_request:
        branches: [main]

env:
    REGISTRY: ghcr.io

jobs:
    backend:
        name: Backend — Build & Test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: thekotlin
                    POSTGRES_USER: thekotlin
                    POSTGRES_PASSWORD: thekotlin_dev
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U thekotlin"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: backend

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: temurin

            - name: Cache Gradle packages
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Build & Test
              run: ./gradlew build --no-daemon
              env:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thekotlin
                  SPRING_DATASOURCE_USERNAME: thekotlin
                  SPRING_DATASOURCE_PASSWORD: thekotlin_dev

    frontend:
        name: Frontend — Lint & Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    admin:
        name: Admin — Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: admin

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: admin/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    docker:
        name: Docker Compose — Build
        runs-on: ubuntu-latest
        needs: [backend, frontend, admin]
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')

        steps:
            - uses: actions/checkout@v4

            - name: Build all images
              run: docker compose build

    build-and-push:
        name: Build and Push Docker Images
        runs-on: ubuntu-latest
        needs: [backend, frontend, admin]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract tag name
              id: extract_tag
              run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

            - name: Set Docker Registry
              run: |
                  # Convert repository name to lowercase
                  REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$REPO" >> $GITHUB_ENV

            - name: Build images
              run: docker compose build

            - name: Push images
              run: docker compose push

    deploy:
        name: Deploy to Production
        needs: build-and-push
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Deploy Placeholder
              run: |
                  echo "Add your deployment steps here!"
                  echo "For example, you can use appleboy/ssh-action to SSH into your server,"
                  echo "pull the new Docker images,"
                  echo "and run docker compose up -d."
                  echo ""
                  echo "# Example SSH Deployment:"
                  echo "# - name: Deploy via SSH"
                  echo "#   uses: appleboy/ssh-action@master"
                  echo "#   with:"
                  echo "#     host: \${{ secrets.SERVER_HOST }}"
                  echo "#     username: \${{ secrets.SERVER_USER }}"
                  echo "#     key: \${{ secrets.SERVER_SSH_KEY }}"
                  echo "#     script: |"
                  echo "#       export IMAGE_TAG=\${GITHUB_REF#refs/tags/}"
                  echo "#       export DOCKER_REGISTRY=\${{ env.REGISTRY }}/\$(echo \"\${{ github.repository }}\" | tr '[:upper:]' '[:lower:]')"
                  echo "#       cd /path/to/your/app"
                  echo "#       docker compose pull"
                  echo "#       docker compose up -d"