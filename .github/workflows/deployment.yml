name: CI & Deployment

on:
    push:
        branches: [main]
        tags:
            - 'v*.*.*'
    pull_request:
        branches: [main]

env:
    REGISTRY: ghcr.io

jobs:
    # ==========================================
    # STAGE 1: Code Quality & Unit Tests
    # ==========================================
    backend-ci:
        name: Backend — Build & Test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: thekotlin
                    POSTGRES_USER: thekotlin
                    POSTGRES_PASSWORD: thekotlin_dev
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U thekotlin"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: backend

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: temurin

            - name: Cache Gradle packages
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Build & Test
              run: ./gradlew build --no-daemon
              env:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thekotlin
                  SPRING_DATASOURCE_USERNAME: thekotlin
                  SPRING_DATASOURCE_PASSWORD: thekotlin_dev

    frontend-ci:
        name: Frontend — Lint, Test & Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: frontend/.next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

            - name: Lint
              run: npm run lint

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    admin-ci:
        name: Admin — Test & Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: admin

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: admin/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: admin/.next/cache
                  key: ${{ runner.os }}-nextjs-admin-${{ hashFiles('admin/package-lock.json') }}-${{ hashFiles('admin/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-admin-${{ hashFiles('admin/package-lock.json') }}-

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    # ==========================================
    # STAGE 2: Integration & E2E Tests
    # ==========================================
    e2e-tests:
        name: Frontend — E2E Tests
        needs: [frontend-ci, backend-ci]
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: frontend/.next/cache
                  key: ${{ runner.os }}-nextjs-e2e-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-e2e-${{ hashFiles('frontend/package-lock.json') }}-

            - name: Get Playwright version
              id: playwright-version
              run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_ENV

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps

            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps

            - name: Start backend
              run: docker compose up --build -d backend postgres
              working-directory: .

            - name: Wait for backend
              run: |
                for i in {1..60}; do
                  curl -fs http://localhost:8080/api/stats > /dev/null && break
                  echo "Waiting for backend to be healthy..."
                  sleep 2
                done
              working-directory: .

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

            - name: Run Playwright tests
              run: npx playwright test
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 30

    # ==========================================
    # STAGE 3: Docker Build & Publish
    # ==========================================
    docker-publish:
        name: Docker — Build & Publish
        needs: [backend-ci, frontend-ci, admin-ci, e2e-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Extract tag name
              if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
              id: extract_tag
              run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

            - name: Set Docker Registry
              if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
              run: |
                  # Convert repository name to lowercase
                  REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$REPO" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Cache Docker images
              uses: actions/cache@v4
              with:
                  path: /tmp/.buildx-cache
                  key: ${{ runner.os }}-docker-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-docker-

            - name: Pull images for cache
              run: IMAGE_TAG=latest docker compose pull || true

            - name: Build images
              run: docker compose build
              env:
                  BUILDX_BAKE_OPTIONS: "--cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max --cache-from=type=local,src=/tmp/.buildx-cache"

            - name: Move Docker cache
              # Temporary fix to prevent cache from growing indefinitely
              run: |
                  rm -rf /tmp/.buildx-cache
                  mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

            - name: Set up Node 24 for Smoke Tests
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Frontend deps (for Playwright)
              run: npm ci
              working-directory: frontend

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
              working-directory: frontend

            - name: Run Production Smoke Tests
              run: python3 run_prod_smoke.py

            - name: Log in to the Container registry
              if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push images
              if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
              run: docker compose push

    # ==========================================
    # STAGE 4: Deployment
    # ==========================================
    deploy:
        name: Deploy to Production
        needs: docker-publish
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Deploy Placeholder
              run: |
                  echo "Add your deployment steps here!"
                  echo "For example, you can use appleboy/ssh-action to SSH into your server,"
                  echo "pull the new Docker images,"
                  echo "and run docker compose up -d."
                  echo ""
                  echo "# Example SSH Deployment:"
                  echo "# - name: Deploy via SSH"
                  echo "#   uses: appleboy/ssh-action@master"
                  echo "#   with:"
                  echo "#     host: \${{ secrets.SERVER_HOST }}"
                  echo "#     username: \${{ secrets.SERVER_USER }}"
                  echo "#     key: \${{ secrets.SERVER_SSH_KEY }}"
                  echo "#     script: |"
                  echo "#       export IMAGE_TAG=\${GITHUB_REF#refs/tags/}"
                  echo "#       export DOCKER_REGISTRY=\${{ env.REGISTRY }}/\$(echo \"\${{ github.repository }}\" | tr '[:upper:]' '[:lower:]')"
                  echo "#       cd /path/to/your/app"
                  echo "#       docker compose pull"
                  echo "#       docker compose up -d"