name: CI & Deployment

on:
    push:
        branches: [main]
        tags:
            - 'v*.*.*'
    pull_request:
        branches: [main]

env:
    REGISTRY: ghcr.io

jobs:
    # ==========================================
    # STAGE 1: Code Quality & Unit Tests
    # ==========================================
    backend-ci:
        name: Backend — Build & Test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: thekotlin
                    POSTGRES_USER: thekotlin
                    POSTGRES_PASSWORD: thekotlin_dev
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U thekotlin"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: backend

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: temurin

            - name: Cache Gradle packages
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Build & Test
              run: ./gradlew build --no-daemon
              env:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thekotlin
                  SPRING_DATASOURCE_USERNAME: thekotlin
                  SPRING_DATASOURCE_PASSWORD: thekotlin_dev

    frontend-ci:
        name: Frontend — Lint, Test & Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: frontend/.next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

            - name: Lint
              run: npm run lint

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    admin-ci:
        name: Admin — Test & Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: admin

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: admin/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: admin/.next/cache
                  key: ${{ runner.os }}-nextjs-admin-${{ hashFiles('admin/package-lock.json') }}-${{ hashFiles('admin/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-admin-${{ hashFiles('admin/package-lock.json') }}-

            - name: Unit Tests
              run: npm test

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

    # ==========================================
    # STAGE 2: Integration & E2E Tests
    # ==========================================
    e2e-tests:
        name: Frontend — E2E Tests
        needs: [frontend-ci, backend-ci]
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Cache Next.js resources
              uses: actions/cache@v4
              with:
                  path: frontend/.next/cache
                  key: ${{ runner.os }}-nextjs-e2e-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-e2e-${{ hashFiles('frontend/package-lock.json') }}-

            - name: Get Playwright version
              id: playwright-version
              run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> $GITHUB_ENV

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps

            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps

            - name: Start backend
              run: docker compose up --build -d backend postgres
              working-directory: .

            - name: Wait for backend
              run: |
                for i in {1..60}; do
                  curl -fs http://localhost:8080/api/stats > /dev/null && break
                  echo "Waiting for backend to be healthy..."
                  sleep 2
                done
              working-directory: .

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

            - name: Run Playwright tests
              run: npx playwright test --ignore=e2e/prod-smoke.spec.ts
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:8080/api

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 30

    # ==========================================
    # STAGE 3: Docker Builds (Concurrent Graph)
    # ==========================================
    build-backend-image:
        name: Docker — Build Backend
        needs: [backend-ci, frontend-ci, admin-ci, e2e-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Log in to Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Build & Push SHA tag
              run: |
                export IMAGE_TAG=${{ github.sha }}
                docker compose build backend
                docker compose push backend
              env:
                  BUILDX_BAKE_OPTIONS: "--cache-to=type=inline --cache-from=ghcr.io/${{ github.repository }}/backend:latest"

    build-frontend-image:
        name: Docker — Build Frontend
        needs: [backend-ci, frontend-ci, admin-ci, e2e-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Log in to Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Build & Push SHA tag
              run: |
                export IMAGE_TAG=${{ github.sha }}
                docker compose build frontend
                docker compose push frontend
              env:
                  BUILDX_BAKE_OPTIONS: "--cache-to=type=inline --cache-from=ghcr.io/${{ github.repository }}/frontend:latest"

    build-admin-image:
        name: Docker — Build Admin
        needs: [backend-ci, frontend-ci, admin-ci, e2e-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Log in to Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Build & Push SHA tag
              run: |
                export IMAGE_TAG=${{ github.sha }}
                docker compose build admin
                docker compose push admin
              env:
                  BUILDX_BAKE_OPTIONS: "--cache-to=type=inline --cache-from=ghcr.io/${{ github.repository }}/admin:latest"

    build-nginx-image:
        name: Docker — Build Nginx
        needs: [backend-ci, frontend-ci, admin-ci, e2e-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Log in to Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Build & Push SHA tag
              run: |
                export IMAGE_TAG=${{ github.sha }}
                docker compose build nginx
                docker compose push nginx
              env:
                  BUILDX_BAKE_OPTIONS: "--cache-to=type=inline --cache-from=ghcr.io/${{ github.repository }}/nginx:latest"

    # ==========================================
    # STAGE 4: Production Validation (Graph Node)
    # ==========================================
    prod-smoke-tests:
        name: Validate Built Images (Smoke Tests)
        needs: [build-backend-image, build-frontend-image, build-admin-image, build-nginx-image]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Set up Node 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
            - name: Install Playwright
              run: |
                npm ci
                npx playwright install --with-deps
              working-directory: frontend
            - name: Start Environment
              run: |
                mkdir -p ssl
                openssl req -x509 -newkey rsa:4096 -keyout ssl/key.pem -out ssl/cert.pem -sha256 -days 365 -nodes -subj "/CN=localhost"
                export IMAGE_TAG=${{ github.sha }}
                docker compose -f docker-compose.prod.yml pull
                docker compose -f docker-compose.prod.yml up -d
                sleep 15
            - name: Run Tests
              run: npx playwright test e2e/prod-smoke.spec.ts
              working-directory: frontend
            - name: Teardown
              if: always()
              run: docker compose -f docker-compose.prod.yml down

    # ==========================================
    # STAGE 5: Docker Publish & Deploy Core
    # ==========================================
    docker-publish:
        name: Publish Images
        needs: [prod-smoke-tests]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        steps:
            - uses: actions/checkout@v4
            - name: Log in to Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Extract tag name
              run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            - name: Set Registry
              run: echo "DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
            - name: Build & Publish All
              run: docker compose build && docker compose push

    # ==========================================
    # STAGE 4: Deployment
    # ==========================================
    deploy:
        name: Deploy to Production
        needs: docker-publish
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SERVER_SSH_KEY }}
                script: |
                  echo "========================================="
                  echo "🚀 Starting Production Deployment..."
                  echo "========================================="
                  
                  export IMAGE_TAG=${GITHUB_REF#refs/tags/}
                  export DOCKER_REGISTRY=${{ env.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  echo "📌 Target Image Tag: $IMAGE_TAG"
                  echo "📌 Target Container Registry: $DOCKER_REGISTRY"
                  
                  echo ""
                  echo "📂 Navigating to application directory..."
                  cd /path/to/your/app
                  pwd
                  
                  echo ""
                  echo "📝 Updating environment variables..."
                  sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env
                  grep "IMAGE_TAG" .env || echo "Warning: IMAGE_TAG not found in .env"
                  
                  echo ""
                  echo "📥 Pulling latest Docker images..."
                  docker compose -f docker-compose.prod.yml pull
                  
                  echo ""
                  echo "🔄 Restarting production services..."
                  docker compose -f docker-compose.prod.yml up -d
                  
                  echo ""
                  echo "========================================="
                  echo "✅ Deployment successful!"
                  echo "========================================="